version: 2
updates:
  # Root package.json dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
    open-pull-requests-limit: 2
    cooldown:
      default-days: 14
      semver-major-days: 45
      semver-minor-days: 21
      semver-patch-days: 7
      include:
        - '*'
    groups:
      npm-production:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      npm-development:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
      npm-major:
        patterns:
          - '*'
        update-types:
          - 'major'
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - 'dependencies'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '09:30'
      timezone: 'America/New_York'
    open-pull-requests-limit: 2
    cooldown:
      default-days: 14
      include:
        - '*'
    groups:
      github-actions:
        patterns:
          - '*'
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - 'dependencies'
      - 'github-actions'
